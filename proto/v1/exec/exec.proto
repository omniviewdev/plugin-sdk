syntax = "proto3";
package omniview.sdk.exec.v1;

option go_package = "github.com/omniviewdev/plugin-sdk/proto/v1/exec;execpb";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";
import "proto/v1/common/common.proto";

message Session {
  string id = 1;
  bool attached = 2;
  repeated string command = 3;
  map<string, string> params = 4;
  map<string, string> labels = 5;
  google.protobuf.Timestamp created_at = 6;
}

message SessionOptions {
  string id = 1;
  repeated string command = 2;
  bool tty = 3;
  map<string, string> params = 4;
  map<string, string> labels = 5;
  string resource_plugin = 6;
  string resource_key = 7;
  google.protobuf.Struct resource_data = 8;
}

message ExecHandler {
  string plugin = 1;
  string resource = 2;
  omniview.sdk.common.v1.ActionTargetBuilder target_builder = 3;
  repeated string default_command = 4;
}

// ===================== REQUESTS/RESPONSES ===================== //

message GetSupportedResourcesResponse {
  repeated ExecHandler handlers = 1;
}

message CreateSessionRequest {
  string id = 1;
  string command = 2;
  bool tty = 3;
  map<string, string> params = 4;
  map<string, string> labels = 5;
}

message CreateSessionResponse {
  Session session = 1;
  bool success = 2;
  string error = 3;
}

message GetSessionRequest {
  string id = 1;
}

message GetSessionResponse {
  Session session = 1;
  bool success = 2;
  string error = 3;
}

message ListSessionsResponse {
  repeated Session sessions = 1;
  bool success = 2;
  string error = 3;
}

message AttachSessionRequest {
  string id = 1;
}

message AttachSessionResponse {
  Session session = 1;
  bytes buffer = 2;
}

message CloseSessionRequest {
  string id = 1;
}

message CloseSessionResponse {
  bool success = 1;
  string error = 2;
}

message ResizeSessionRequest {
  string id = 1;
  int32 rows = 2;
  int32 cols = 3;
}

message ResizeSessionResponse {
  bool success = 1;
  string error = 2;
}

// ===================== STREAMS  ===================== //

message StreamInput {
  string id = 1;
  bytes data = 2;
}

message StreamOutput {
  enum Target {
    STDOUT = 0;
    STDERR = 1;
  }
  string id = 1;
  Target target = 2;
  bytes data = 3;
  StreamSignal signal = 4;
  StreamError error = 5;
}

enum StreamSignal {
  STREAM_SIGNAL_NONE = 0;
  STREAM_SIGNAL_CLOSE = 1;
  STREAM_SIGNAL_SIGINT = 2;
  STREAM_SIGNAL_SIGQUIT = 3;
  STREAM_SIGNAL_SIGTERM = 4;
  STREAM_SIGNAL_SIGKILL = 5;
  STREAM_SIGNAL_SIGHUP = 6;
  STREAM_SIGNAL_SIGUSR1 = 7;
  STREAM_SIGNAL_SIGUSR2 = 8;
  STREAM_SIGNAL_SIGWINCH = 9;
  STREAM_SIGNAL_ERROR = 10;
}

message StreamError {
  string title = 1;
  string message = 2;
  string suggestion = 3;
  bool retryable = 4;
  repeated string retry_commands = 5;
}

service ExecPlugin {
  rpc GetSupportedResources(google.protobuf.Empty) returns (GetSupportedResourcesResponse);
  rpc GetSession(GetSessionRequest) returns (GetSessionResponse);
  rpc ListSessions(google.protobuf.Empty) returns (ListSessionsResponse);
  rpc CreateSession(SessionOptions) returns (CreateSessionResponse);
  rpc AttachSession(AttachSessionRequest) returns (AttachSessionResponse);
  rpc DetachSession(AttachSessionRequest) returns (AttachSessionResponse);
  rpc CloseSession(CloseSessionRequest) returns (CloseSessionResponse);
  rpc ResizeSession(ResizeSessionRequest) returns (ResizeSessionResponse);

  // Multiplexed stream for input and output
  rpc Stream(stream StreamInput) returns (stream StreamOutput);
}
